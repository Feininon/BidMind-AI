<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BidMind AI - Create Auction</title>
    <link rel="stylesheet" href="/static/style.css"> 
</head>
<body>
    <header>
        <h1>🚀 BidMind AI</h1>
        <nav>
            <a href="/dashboard">Dashboard</a>
            <a href="/create">Create Auction</a>
            <a href="/history">History</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <h2>📦 Create New Auction</h2>
            <form id="createForm" onsubmit="createAuction(event)">
                <label>Title</label>
                <input type="text" id="title" placeholder="e.g., Vintage Camera" required>
                
                <label>Description</label>
                <textarea id="description" rows="4" placeholder="Describe your item in detail..." required></textarea>
                
                <label>Starting Price ($)</label>
                <input type="number" id="startingPrice" placeholder="100.00" min="1" step="0.01" required>
                
                <label>Duration (hours)</label>
                <select id="duration">
                    <option value="1">1 hour</option>
                    <option value="6">6 hours</option>
                    <option value="24" selected>24 hours</option>
                    <option value="72">3 days</option>
                    <option value="168">7 days</option>
                </select>
                
                <button type="submit">🚀 Launch Auction</button>
            </form>
            
            <div id="aiAnalysis" class="ai-result hidden"></div>
            <div id="message" class="alert hidden"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user) location.href = '/';

        async function createAuction(e) {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                starting_price: parseFloat(document.getElementById('startingPrice').value),
                duration_hours: parseInt(document.getElementById('duration').value)
            };
            
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = "Analyzing with AI...";
            
            try {
                const res = await fetch('/api/auctions', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                const data = await res.json();
                
                if(res.ok) {
                    // Show AI analysis
                    const aiDiv = document.getElementById('aiAnalysis');
                    aiDiv.innerHTML = `
                        <h4>🤖 AI Analysis:</h4>
                        <pre>${JSON.stringify(data.ai_analysis, null, 2)}</pre>
                        <p><strong>AI Predicted Final Price: $${data.ai_prediction?.toFixed(2)}</strong></p>
                    `;
                    aiDiv.classList.remove('hidden');
                    
                    showMessage('message', `✅ Auction created! ID: ${data.id}`, 'success');
                    
                    // Redirect to auction page after 2 seconds
                    setTimeout(() => {
                        location.href = `/auction/${data.id}`;
                    }, 2000);
                } else {
                    showMessage('message', `❌ ${data.detail}`, 'error');
                }
            } catch(err) {
                showMessage('message', 'Network error: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = "🚀 Launch Auction";
            }
        }

        function showMessage(elementId, msg, type) {
            const el = document.getElementById(elementId);
            el.textContent = msg;
            el.className = `alert ${type}`;
            el.classList.remove('hidden');
        }

        function logout() {
            localStorage.removeItem('user');
            location.href = '/';
        }
    </script>
</body>
</html>
