<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidMind AI - Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- HEADER START -->
    <header style="background: #0f3460; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="margin: 0; font-size: 1.5rem;">🚀 BidMind AI</h1>
        <nav style="display: flex; gap: 0.5rem;">
            <a href="/dashboard" style="color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; background: rgba(255,255,255,0.1);">📋 Dashboard</a>
            <a href="/create" style="color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; background: rgba(255,255,255,0.1);">➕ Create</a>
            <a href="/analytics" style="color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; background: rgba(255,255,255,0.1);">📊 Analytics</a>
            <a href="/chat" style="color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; background: rgba(255,255,255,0.2);">💬 Chat</a>
            <a href="/bot" style="color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; background: rgba(255,255,255,0.1);">🤖 Bot</a>
            <a href="/history" style="color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; background: rgba(255,255,255,0.1);">📜 History</a>
        <a href="/profile" style="color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; background: rgba(255,255,255,0.1);">👤 Profile</a>
        </nav>
        <div id="userSection"></div>
    </header>
    <!-- HEADER END -->

    <div class="container">
        <div class="card">
            <h2>💬 AI Chat Assistant</h2>
            <div id="chatMessages" class="bid-log" style="height: 400px;">
                <div class="chat-message ai"><strong>🤖 AI:</strong> Hello! Ask me about auctions.</div>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <input type="text" id="chatInput" placeholder="Type your message..." style="flex: 1;">
                <button class="btn-primary" onclick="sendMessage()" style="width: auto;">Send</button>
            </div>
        </div>
    </div>

    <script>
        const userStr = localStorage.getItem('bidmind_user');
        const user = userStr ? JSON.parse(userStr) : null;
        if(!user) location.href = '/';
        
        document.getElementById('userSection').innerHTML = `<span style="background: rgba(255,255,255,0.2); padding: 0.5rem 1rem; border-radius: 6px;">👤 ${user.username}</span>`;
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if(!message) return;
            
            const container = document.getElementById('chatMessages');
            container.innerHTML += `<div class="log-entry"><strong>You:</strong> ${message}</div>`;
            input.value = '';
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message, user_id: user.user_id})
                });
                const data = await res.json();
                container.innerHTML += `<div class="log-entry"><strong>🤖 AI:</strong> ${data.response}</div>`;
                container.scrollTop = container.scrollHeight;
            } catch(err) {
                container.innerHTML += `<div class="log-entry" style="color: red;">Error: ${err.message}</div>`;
            }
        }
        
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
