<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidMind AI - Login</title>
    <link rel="stylesheet" href="/static/style.css">  
</head>
<body>
    <header>
        <h1>🚀 BidMind AI</h1>
        <div>
            <span class="badge">WebSocket</span>
            <span class="badge">AI-Powered</span>
        </div>
    </header>

    <div class="container">
        <div class="card" style="max-width: 400px; margin: 3rem auto;">
            <h2>🔐 Login</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p style="margin-top: 1rem; text-align: center;">
                New? <a href="#" onclick="showRegister()">Create account</a>
            </p>
            <div id="registerForm" class="hidden">
                <hr style="margin: 1.5rem 0;">
                <input type="text" id="regUsername" placeholder="Choose Username">
                <input type="password" id="regPassword" placeholder="Choose Password">
                <button onclick="register()">Register</button>
            </div>
            <div id="message" class="alert hidden"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        function showRegister() {
            document.getElementById('registerForm').classList.remove('hidden');
        }
        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            showMessage(data.detail || `Registered! User ID: ${data.user_id}`, res.ok ? 'success' : 'error');
            if(res.ok) setTimeout(() => location.reload(), 1500);
        }
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if(res.ok) {
                localStorage.setItem('user', JSON.stringify(data));
                location.href = '/dashboard';
            } else {
                showMessage(data.detail, 'error');
            }
        };
        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = `alert ${type}`;
            el.classList.remove('hidden');
        }
    </script>
</body>
</html>
